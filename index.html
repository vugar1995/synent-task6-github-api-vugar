<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GitHub API integration project with Fetch API, loading state, and error handling." />
  <title>GitHub Profile Finder</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/app.js"></script>
</head>
<body>
  <main class="app">
    <section class="search-panel" aria-labelledby="app-title">
      <p class="tag">Fetch API Project</p>
      <h1 id="app-title">GitHub Profile Finder</h1>
      <p>Search for a GitHub username to view profile details and public repositories.</p>
      <form id="search-form" class="search-form">
        <label class="sr-only" for="username">GitHub username</label>
        <input id="username" type="text" placeholder="Try vugar1995" value="vugar1995" autocomplete="off" />
        <button type="submit">Search</button>
      </form>
    </section>
    <section id="status" class="status" aria-live="polite"></section>
    <section id="profile" class="profile-section" aria-live="polite"></section>
    <section id="repos" class="repos-section" aria-live="polite"></section>
  </main>
</body>
</html>
